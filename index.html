<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLD Training Tracker</title>
    <meta
      name="description"
      content="Habit tracker do treningu blindfolded speedcubingu"
    />
    <meta name="theme-color" content="#E86A17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Trening BLD" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      :root {
        --bg: #f7f6f3;
        --card: #ffffff;
        --border: #d9d7d2;
        --text: #222222;
        --text-secondary: #6c6c6c;
        --accent: #e86a17;
        --today-bg: #fff7ef;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "IBM Plex Sans",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        padding: 16px;
        max-width: 560px;
        margin: 0 auto;
      }

      .mono {
        font-family: "IBM Plex Mono", monospace;
      }

      /* Stats Bar */
      .stats-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
        gap: 8px;
      }

      .stats-bar .stat {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
      }

      .stats-bar .stat-value {
        font-weight: 600;
        color: var(--accent);
      }

      .stats-bar .stat-label {
        color: var(--text-secondary);
      }

      .week-progress {
        display: flex;
        gap: 3px;
      }

      .week-progress .day-dot {
        width: 8px;
        height: 8px;
        border-radius: 2px;
        background: var(--border);
      }

      .week-progress .day-dot.full {
        background: var(--accent);
      }

      .week-progress .day-dot.partial {
        background: linear-gradient(
          135deg,
          var(--accent) 50%,
          var(--border) 50%
        );
      }

      /* Heatmap */
      .heatmap-section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 12px;
        overflow: hidden;
      }

      .heatmap-header {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }

      .heatmap-header h3 {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-secondary);
      }

      .heatmap-header i {
        color: var(--text-secondary);
        transition: transform 0.2s;
      }

      .heatmap-section.collapsed .heatmap-header i {
        transform: rotate(-90deg);
      }

      .heatmap-section.collapsed .heatmap-content {
        display: none;
      }

      .heatmap-content {
        padding: 0 16px 16px;
      }

      .heatmap-grid {
        display: grid;
        grid-template-columns: repeat(14, 1fr);
        gap: 3px;
      }

      .heatmap-cell {
        aspect-ratio: 1;
        border-radius: 2px;
        background: var(--border);
        min-width: 0;
        max-width: 18px;
      }

      .heatmap-cell.full {
        background: var(--accent);
      }

      .heatmap-cell.partial {
        background: #f5b48a;
      }

      .heatmap-cell.today {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      .heatmap-cell.future {
        background: #edebe8;
      }

      /* Focus Card */
      .focus-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
      }

      .focus-card h3 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
        color: var(--text);
      }

      .focus-item {
        margin-bottom: 10px;
        padding-left: 12px;
        border-left: 2px solid var(--border);
      }

      .focus-item:last-child {
        margin-bottom: 0;
      }

      .focus-item strong {
        font-weight: 600;
        color: var(--text);
      }

      .focus-item p {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 2px;
      }

      /* Today Card */
      .today-card {
        background: var(--today-bg);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .today-card .card-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 16px;
      }

      .today-card h2 {
        font-size: 18px;
        font-weight: 600;
      }

      .today-card .date {
        font-size: 14px;
        color: var(--text-secondary);
      }

      .task-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .task-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px 12px;
        background: var(--card);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .task-item:hover {
        background: #fafaf9;
      }

      .task-item:active {
        background: #f5f4f2;
      }

      .checkbox {
        width: 22px;
        height: 22px;
        border: 2px solid var(--border);
        border-radius: 4px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        margin-top: 1px;
      }

      .checkbox i {
        color: white;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.15s;
      }

      .task-item.done .checkbox {
        background: var(--accent);
        border-color: var(--accent);
      }

      .task-item.done .checkbox i {
        opacity: 1;
      }

      .task-item.done .task-text {
        color: var(--text-secondary);
        text-decoration: line-through;
      }

      .task-text {
        font-size: 15px;
        flex: 1;
      }

      .task-text small {
        display: block;
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 2px;
      }

      .task-or {
        text-align: center;
        font-size: 12px;
        color: var(--text-secondary);
        padding: 4px 0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* History Section */
      .history-section {
        margin-top: 24px;
      }

      .history-section h3 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
        padding-left: 4px;
      }

      .month-group {
        margin-bottom: 20px;
      }

      .month-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 8px;
        padding-left: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .week-accordion {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 8px;
        overflow: hidden;
      }

      .week-header {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }

      .week-header:hover {
        background: #fafaf9;
      }

      .week-header .week-title {
        font-size: 14px;
        font-weight: 500;
      }

      .week-header .week-meta {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .week-header .week-progress-mini {
        display: flex;
        gap: 3px;
      }

      .week-header .day-mini {
        width: 6px;
        height: 6px;
        border-radius: 1px;
        background: var(--border);
      }

      .week-header .day-mini.full {
        background: var(--accent);
      }

      .week-header .day-mini.partial {
        background: #f5b48a;
      }

      .week-header i {
        color: var(--text-secondary);
        transition: transform 0.2s;
      }

      .week-accordion.collapsed .week-header i {
        transform: rotate(-90deg);
      }

      .week-accordion.collapsed .week-content {
        display: none;
      }

      .week-content {
        border-top: 1px solid var(--border);
      }

      .day-row {
        display: flex;
        align-items: center;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }

      .day-row:last-child {
        border-bottom: none;
      }

      .day-row:hover {
        background: #fafaf9;
      }

      .day-row.is-today {
        background: var(--today-bg);
        border-left: 3px solid var(--accent);
        padding-left: 13px;
      }

      .day-row.is-future .day-name,
      .day-row.is-future .day-date {
        opacity: 0.5;
      }

      .day-row .day-name {
        width: 36px;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .day-row .day-date {
        width: 50px;
        font-size: 13px;
        color: var(--text);
      }

      .day-row .day-status {
        margin-left: auto;
        color: var(--text-secondary);
        font-size: 18px;
      }

      .day-row .day-status.full {
        color: var(--accent);
      }

      .day-row .day-status.partial {
        color: #f5b48a;
      }

      /* Day Detail Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        z-index: 100;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.2s,
          visibility 0.2s;
      }

      .modal-overlay.open {
        opacity: 1;
        visibility: visible;
      }

      .modal-content {
        background: var(--card);
        border-radius: 16px 16px 0 0;
        width: 100%;
        max-width: 560px;
        max-height: 85vh;
        overflow-y: auto;
        transform: translateY(100%);
        transition: transform 0.25s ease-out;
      }

      .modal-overlay.open .modal-content {
        transform: translateY(0);
      }

      .modal-header {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        background: var(--card);
      }

      .modal-header h3 {
        font-size: 16px;
        font-weight: 600;
      }

      .modal-close {
        background: none;
        border: none;
        font-size: 24px;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 4px;
      }

      .modal-body {
        padding: 16px;
      }

      .modal-body .task-list {
        gap: 8px;
      }

      .modal-body .task-item {
        background: var(--bg);
      }

      /* Responsive */
      @media (min-width: 560px) {
        body {
          padding: 24px;
        }

        .modal-content {
          border-radius: 16px;
          margin: auto;
          max-height: 70vh;
        }

        .modal-overlay {
          align-items: center;
          padding: 24px;
        }
      }

      @media (max-width: 380px) {
        .stats-bar {
          padding: 10px 12px;
        }

        .stats-bar .stat {
          font-size: 13px;
        }

        .today-card h2 {
          font-size: 16px;
        }

        .task-text {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value mono" id="days-progress">0/62</span>
        <span class="stat-label">dni</span>
      </div>
      <div class="stat">
        <span class="stat-value mono" id="streak-count">0</span>
        <span class="stat-label">streak</span>
      </div>
      <div class="week-progress" id="week-progress"></div>
    </div>

    <!-- Heatmap -->
    <div class="heatmap-section" id="heatmap-section">
      <div class="heatmap-header" onclick="toggleHeatmap()">
        <h3>Postęp programu</h3>
        <i class="ti ti-chevron-down"></i>
      </div>
      <div class="heatmap-content">
        <div class="heatmap-grid" id="heatmap-grid"></div>
      </div>
    </div>

    <!-- Focus Card -->
    <div class="focus-card" id="focus-card">
      <h3>Na co położyć nacisk</h3>
      <div id="focus-content"></div>
    </div>

    <!-- Today Card -->
    <div class="today-card" id="today-card">
      <div class="card-header">
        <h2>Dzisiaj</h2>
        <span class="date mono" id="today-date"></span>
      </div>
      <div class="task-list" id="today-tasks"></div>
    </div>

    <!-- History -->
    <div class="history-section">
      <h3>Historia</h3>
      <div id="history-content"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal" onclick="closeModal(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3 id="modal-title"></h3>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="task-list" id="modal-tasks"></div>
        </div>
      </div>
    </div>

    <script src="plan.js"></script>
    <script>
      // Constants from PLAN
      const START_DATE = PLAN.startDate;
      const END_DATE = PLAN.endDate;
      const TOTAL_DAYS =
        Math.round((END_DATE - START_DATE) / (1000 * 60 * 60 * 24)) + 1;

      const DAY_NAMES = ["Nd", "Pon", "Wt", "Śr", "Czw", "Pt", "Sob"];
      const DAY_NAMES_FULL = [
        "Niedziela",
        "Poniedziałek",
        "Wtorek",
        "Środa",
        "Czwartek",
        "Piątek",
        "Sobota",
      ];
      const MONTH_NAMES = [
        "Styczeń",
        "Luty",
        "Marzec",
        "Kwiecień",
        "Maj",
        "Czerwiec",
        "Lipiec",
        "Sierpień",
        "Wrzesień",
        "Październik",
        "Listopad",
        "Grudzień",
      ];

      const DAY_MAP = [
        "sunday",
        "monday",
        "tuesday",
        "wednesday",
        "thursday",
        "friday",
        "saturday",
      ];

      // Helper functions
      function formatDateKey(date) {
        const d = new Date(date);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function getStorageKey(date) {
        return `day:${formatDateKey(date)}`;
      }

      function getDayData(date) {
        const key = getStorageKey(date);
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : {};
      }

      function setDayData(date, data) {
        const key = getStorageKey(date);
        localStorage.setItem(key, JSON.stringify(data));
      }

      function get4BLDCount(date) {
        const dateKey = formatDateKey(date);
        if (PLAN.ramp4BLD.dates2attempts.includes(dateKey)) return 2;
        if (date >= PLAN.ramp4BLD.fullRampStart) return 4;
        return 0;
      }

      function getTasksForDay(date) {
        const dayOfWeek = date.getDay();
        const dayName = DAY_MAP[dayOfWeek];
        const dayTasks = PLAN.tasks[dayName] || [];
        const tasks = [];
        const count4bld = get4BLDCount(date);

        for (const taskDef of dayTasks) {
          if (taskDef.type === "4bld_ramp") {
            if (count4bld > 0) {
              for (let i = 1; i <= count4bld; i++) {
                tasks.push({
                  id: `${taskDef.idPrefix}_${i}`,
                  text: `${taskDef.text} ${i}`,
                  detail: taskDef.detail || "",
                });
              }
            }
          } else {
            const task = {
              id: taskDef.id,
              text: taskDef.text,
              detail: taskDef.detail || "",
            };
            if (taskDef.or) {
              task.or = {
                id: taskDef.or.id,
                text: taskDef.or.text,
                detail: taskDef.or.detail || "",
              };
            }
            tasks.push(task);
          }
        }

        return tasks;
      }

      function isDayComplete(date) {
        const tasks = getTasksForDay(date);
        const data = getDayData(date);

        if (tasks.length === 0) return { full: false, partial: false };

        let completedCount = 0;
        let totalTasks = 0;

        for (const task of tasks) {
          if (task.or) {
            // OR task: one of them must be done
            totalTasks++;
            if (data[task.id] || data[task.or.id]) completedCount++;
          } else {
            totalTasks++;
            if (data[task.id]) completedCount++;
          }
        }

        return {
          full: completedCount === totalTasks,
          partial: completedCount > 0 && completedCount < totalTasks,
          completed: completedCount,
          total: totalTasks,
        };
      }

      function calculateStreak() {
        const today = getEffectiveToday();
        let streak = 0;
        let checkDate = new Date(today);
        checkDate.setDate(checkDate.getDate() - 1); // Start from yesterday

        while (checkDate >= START_DATE) {
          const status = isDayComplete(checkDate);
          if (status.full) {
            streak++;
            checkDate.setDate(checkDate.getDate() - 1);
          } else {
            break;
          }
        }

        return streak;
      }

      function getEffectiveToday() {
        const now = new Date();
        now.setHours(0, 0, 0, 0);

        if (now >= START_DATE && now <= END_DATE) {
          return now;
        } else if (now < START_DATE) {
          return new Date(START_DATE);
        } else {
          return new Date(END_DATE);
        }
      }

      function getWeekOfProgram(date) {
        const diffTime = date - START_DATE;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        return Math.floor(diffDays / 7);
      }

      function getWeekStart(date) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
        return new Date(d.setDate(diff));
      }

      // Render functions
      function renderStatsBar() {
        let fullDays = 0;
        let partialDays = 0;
        const today = getEffectiveToday();

        for (let i = 0; i < TOTAL_DAYS; i++) {
          const date = new Date(START_DATE);
          date.setDate(date.getDate() + i);

          const status = isDayComplete(date);
          if (status.full) fullDays++;
          else if (status.partial) partialDays++;
        }

        document.getElementById("days-progress").textContent =
          `${fullDays}/${TOTAL_DAYS}`;
        document.getElementById("streak-count").textContent = calculateStreak();

        // Week progress
        const weekProgressEl = document.getElementById("week-progress");
        weekProgressEl.innerHTML = "";

        const weekStart = getWeekStart(today);
        for (let i = 0; i < 7; i++) {
          const dayDate = new Date(weekStart);
          dayDate.setDate(dayDate.getDate() + i);

          const dot = document.createElement("div");
          dot.className = "day-dot";

          if (dayDate >= START_DATE && dayDate <= END_DATE) {
            const status = isDayComplete(dayDate);
            if (status.full) dot.classList.add("full");
            else if (status.partial) dot.classList.add("partial");
          }

          weekProgressEl.appendChild(dot);
        }
      }

      function renderHeatmap() {
        const grid = document.getElementById("heatmap-grid");
        grid.innerHTML = "";
        const today = getEffectiveToday();

        for (let i = 0; i < TOTAL_DAYS; i++) {
          const date = new Date(START_DATE);
          date.setDate(date.getDate() + i);

          const cell = document.createElement("div");
          cell.className = "heatmap-cell";
          cell.title = `${date.getDate()} ${MONTH_NAMES[date.getMonth()]}`;

          if (formatDateKey(date) === formatDateKey(today)) {
            cell.classList.add("today");
          }

          const status = isDayComplete(date);
          if (status.full) {
            cell.classList.add("full");
          } else if (status.partial) {
            cell.classList.add("partial");
          } else if (date > today) {
            cell.classList.add("future");
          }

          grid.appendChild(cell);
        }
      }

      function toggleHeatmap() {
        document
          .getElementById("heatmap-section")
          .classList.toggle("collapsed");
      }

      function renderFocusCard() {
        const container = document.getElementById("focus-content");
        container.innerHTML = "";

        for (const item of PLAN.focus) {
          const div = document.createElement("div");
          div.className = "focus-item";
          div.innerHTML = `
            <strong>${item.title}</strong>
            <p>${item.description}</p>
          `;
          container.appendChild(div);
        }
      }

      function renderTaskItem(task, data, date, container, isModal = false) {
        const item = document.createElement("div");
        item.className = "task-item";
        if (data[task.id]) item.classList.add("done");

        item.innerHTML = `
        <div class="checkbox"><i class="ti ti-check"></i></div>
        <div class="task-text">
          ${task.text}
          ${task.detail ? `<small>${task.detail}</small>` : ""}
        </div>
      `;

        item.onclick = () => {
          data[task.id] = !data[task.id];
          if (task.or && data[task.id]) {
            data[task.or.id] = false;
          }
          setDayData(date, data);
          renderAll();
          if (isModal) openDayModal(date);
        };

        container.appendChild(item);

        if (task.or) {
          const orLabel = document.createElement("div");
          orLabel.className = "task-or";
          orLabel.textContent = "lub";
          container.appendChild(orLabel);

          const orItem = document.createElement("div");
          orItem.className = "task-item";
          if (data[task.or.id]) orItem.classList.add("done");

          orItem.innerHTML = `
          <div class="checkbox"><i class="ti ti-check"></i></div>
          <div class="task-text">
            ${task.or.text}
            ${task.or.detail ? `<small>${task.or.detail}</small>` : ""}
          </div>
        `;

          orItem.onclick = () => {
            data[task.or.id] = !data[task.or.id];
            if (data[task.or.id]) {
              data[task.id] = false;
            }
            setDayData(date, data);
            renderAll();
            if (isModal) openDayModal(date);
          };

          container.appendChild(orItem);
        }
      }

      function renderTodayCard() {
        const today = getEffectiveToday();
        const dayName = DAY_NAMES_FULL[today.getDay()];
        const dateStr = `${today.getDate()} ${MONTH_NAMES[today.getMonth()]}`;

        document.getElementById("today-date").textContent =
          `${dayName}, ${dateStr}`;

        const tasks = getTasksForDay(today);
        const data = getDayData(today);
        const container = document.getElementById("today-tasks");
        container.innerHTML = "";

        for (const task of tasks) {
          renderTaskItem(task, data, today, container);
        }
      }

      function renderHistory() {
        const container = document.getElementById("history-content");
        container.innerHTML = "";
        const today = getEffectiveToday();
        const currentWeek = getWeekOfProgram(today);

        // Group days by month and week
        const months = {};

        for (let i = 0; i < TOTAL_DAYS; i++) {
          const date = new Date(START_DATE);
          date.setDate(date.getDate() + i);

          const monthKey = `${date.getFullYear()}-${date.getMonth()}`;
          const weekNum = getWeekOfProgram(date);

          if (!months[monthKey]) {
            months[monthKey] = {
              name: MONTH_NAMES[date.getMonth()],
              weeks: {},
            };
          }

          if (!months[monthKey].weeks[weekNum]) {
            months[monthKey].weeks[weekNum] = [];
          }

          months[monthKey].weeks[weekNum].push(date);
        }

        for (const [monthKey, monthData] of Object.entries(months)) {
          const monthGroup = document.createElement("div");
          monthGroup.className = "month-group";

          const monthTitle = document.createElement("div");
          monthTitle.className = "month-title";
          monthTitle.textContent = monthData.name;
          monthGroup.appendChild(monthTitle);

          for (const [weekNum, days] of Object.entries(monthData.weeks)) {
            const isCurrentWeek = parseInt(weekNum) === currentWeek;
            const weekAccordion = document.createElement("div");
            weekAccordion.className = "week-accordion";
            if (!isCurrentWeek) weekAccordion.classList.add("collapsed");

            const startDay = days[0].getDate();
            const endDay = days[days.length - 1].getDate();
            const weekLabel = `${startDay}–${endDay} ${MONTH_NAMES[days[0].getMonth()]}`;

            // Week progress mini
            let progressHtml = '<div class="week-progress-mini">';
            for (const day of days) {
              const status = isDayComplete(day);
              let cls = "day-mini";
              if (status.full) cls += " full";
              else if (status.partial) cls += " partial";
              progressHtml += `<div class="${cls}"></div>`;
            }
            progressHtml += "</div>";

            weekAccordion.innerHTML = `
            <div class="week-header" onclick="toggleWeek(this)">
              <span class="week-title">Tydzień ${parseInt(weekNum) + 1}</span>
              <div class="week-meta">
                ${progressHtml}
                <i class="ti ti-chevron-down"></i>
              </div>
            </div>
            <div class="week-content"></div>
          `;

            const weekContent = weekAccordion.querySelector(".week-content");

            for (const day of days) {
              const isToday = formatDateKey(day) === formatDateKey(today);
              const isFuture = day > today;
              const status = isDayComplete(day);

              let statusIcon = "ti-circle";
              let statusClass = "";
              if (status.full) {
                statusIcon = "ti-check";
                statusClass = "full";
              } else if (status.partial) {
                statusIcon = "ti-circle-half-filled";
                statusClass = "partial";
              }

              const dayRow = document.createElement("div");
              dayRow.className = "day-row";
              if (isToday) dayRow.classList.add("is-today");
              if (isFuture) dayRow.classList.add("is-future");

              dayRow.innerHTML = `
              <span class="day-name">${DAY_NAMES[day.getDay()]}</span>
              <span class="day-date mono">${day.getDate()}</span>
              <i class="ti ${statusIcon} day-status ${statusClass}"></i>
            `;

              dayRow.onclick = () => {
                if (isToday) {
                  document
                    .getElementById("today-card")
                    .scrollIntoView({ behavior: "smooth" });
                } else {
                  openDayModal(day);
                }
              };

              weekContent.appendChild(dayRow);
            }

            monthGroup.appendChild(weekAccordion);
          }

          container.appendChild(monthGroup);
        }
      }

      function toggleWeek(header) {
        header.parentElement.classList.toggle("collapsed");
      }

      function openDayModal(date) {
        const modal = document.getElementById("modal");
        const dayName = DAY_NAMES_FULL[date.getDay()];
        const dateStr = `${date.getDate()} ${MONTH_NAMES[date.getMonth()]}`;

        document.getElementById("modal-title").textContent =
          `${dayName}, ${dateStr}`;

        const tasks = getTasksForDay(date);
        const data = getDayData(date);
        const container = document.getElementById("modal-tasks");
        container.innerHTML = "";

        for (const task of tasks) {
          renderTaskItem(task, data, date, container, true);
        }

        modal.classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeModal(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById("modal").classList.remove("open");
        document.body.style.overflow = "";
      }

      function renderAll() {
        renderStatsBar();
        renderHeatmap();
        renderFocusCard();
        renderTodayCard();
        renderHistory();
      }

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        renderAll();

        // Auto-scroll to today card
        setTimeout(() => {
          document
            .getElementById("today-card")
            .scrollIntoView({ behavior: "smooth", block: "center" });
        }, 100);
      });

      // Handle escape key for modal
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      // Register service worker
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
