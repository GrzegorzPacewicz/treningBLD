<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLD Training Tracker</title>
    <meta
      name="description"
      content="Habit tracker do treningu blindfolded speedcubingu"
    />
    <meta name="theme-color" content="#E86A17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Trening BLD" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value mono" id="days-progress">0/62</span>
        <span class="stat-label">dni</span>
      </div>
      <div class="stat">
        <span class="stat-value mono" id="streak-count">0</span>
        <span class="stat-label">streak</span>
      </div>
      <div class="week-progress" id="week-progress"></div>
    </div>

    <!-- Heatmap -->
    <div class="heatmap-section" id="heatmap-section">
      <div class="heatmap-header" onclick="toggleHeatmap()">
        <h3>Postęp programu</h3>
        <i class="ti ti-chevron-down"></i>
      </div>
      <div class="heatmap-content">
        <div class="heatmap-grid" id="heatmap-grid"></div>
      </div>
    </div>

    <!-- Focus Card -->
    <div class="focus-card" id="focus-card">
      <h3>Na co położyć nacisk</h3>
      <div id="focus-content"></div>
    </div>

    <!-- Today Card -->
    <div class="today-card" id="today-card">
      <div class="card-header">
        <h2>Dzisiaj</h2>
        <span class="date mono" id="today-date"></span>
      </div>
      <div class="task-list" id="today-tasks"></div>
    </div>

    <!-- History -->
    <div class="history-section">
      <h3>Historia</h3>
      <div id="history-content"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal" onclick="closeModal(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3 id="modal-title"></h3>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="task-list" id="modal-tasks"></div>
        </div>
      </div>
    </div>

    <script src="plan.js"></script>
    <script src="app.js"></script>
  </body>
</html>
